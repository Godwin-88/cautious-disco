[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

; ── FastAPI backend ───────────────────────────────────────────────────────────
; Neo4j connection is hardwired to localhost — Aura URI is ignored here.
[program:backend]
command=uvicorn backend.main:app --host 0.0.0.0 --port 8080 --log-level info
directory=/app
autostart=true
autorestart=true
startretries=5
stdout_logfile=/var/log/supervisor/backend.out.log
stderr_logfile=/var/log/supervisor/backend.err.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
; Pins Neo4j to localhost regardless of any HF secret the user may have set
environment=PYTHONPATH="/app",NEO4J_URI="bolt://localhost:7687",NEO4J_USERNAME="neo4j",NEO4J_PASSWORD="your-password"

; ── Streamlit frontend (public port 7860) ────────────────────────────────────
[program:frontend]
command=streamlit run frontend/app.py
    --server.port=7860
    --server.address=0.0.0.0
    --server.headless=true
    --server.enableCORS=false
    --server.enableXsrfProtection=false
directory=/app
autostart=true
autorestart=true
startretries=5
stdout_logfile=/var/log/supervisor/frontend.out.log
stderr_logfile=/var/log/supervisor/frontend.err.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
environment=PYTHONPATH="/app",BACKEND_URL="http://localhost:8080"
